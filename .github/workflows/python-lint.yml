name: Python Code Quality

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get changed Python files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            **/*.py

      - name: Set up Python
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install uv
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install ruff
        if: steps.changed-files.outputs.any_changed == 'true'
        run: uv tool install ruff

      - name: Run ruff check on changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          echo "Checking changed Python files:"
          echo "$CHANGED_FILES" | tr ' ' '\n'
          uv tool run ruff check --output-format=github $CHANGED_FILES

      - name: Run ruff format check on changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          echo "Checking format of changed Python files:"
          uv tool run ruff format --check $CHANGED_FILES

      - name: Skip message
        if: steps.changed-files.outputs.any_changed == 'false'
        run: echo "No Python files changed - skipping Python linting"
