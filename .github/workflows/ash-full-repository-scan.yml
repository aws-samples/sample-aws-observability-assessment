name: ASH Full Repository Scan

on:
  push:
    branches: [ main ]
  schedule:
    # Run at 2 AM UTC on the 1st of every month
    - cron: '0 2 1 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install ASH
        run: pip install git+https://github.com/awslabs/automated-security-helper.git@v3.2.6

      - name: Run ASH full repository scan
        run: ash --mode container 2>&1 | tee ash-output.log
        continue-on-error: true

      - name: Generate scan summary
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "# ASH Full Repository Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date:** $(date -u +%Y-%m-%dT%H:%M:%S+00:00)" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** $EVENT_NAME" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "ash-output.log" ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 ash-output.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ash-full-scan-results
          path: ash-output.log
          retention-days: 30
