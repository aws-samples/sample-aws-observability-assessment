#
# Security controls implemented in this template:
#   - IAM role scoped to read-only observability actions (Priority: HIGH)
#   - Trust policy restricted to a single assessment account (Priority: HIGH)
#   - SSM write actions separated with document-name condition (Priority: HIGH)
AWSTemplateFormatVersion: 2010-09-09
Description: >-
  Deploys the IAM role (almost entirely read-only, with a single
  ssm:SendCommand grant scoped to the AWS-RunShellScript document for the
  EC2 CloudWatch agent check) that the Observability Assessment uses to scan
  this account. Deploy this template in each account you want to assess; the
  role is assumed by the AWS CodeBuild project running in the assessment account.

Parameters:
  AssessmentAccountID:
    Description: The 12-digit account ID where the CodeBuild assessment project runs.
    Type: String
    Default: '012345678910'
    AllowedPattern: \d{12}
    ConstraintDescription: Enter the 12-digit account ID with no spaces.

Resources:
  ObservabilityAssessmentRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: ObservabilityAssessmentRole
      Path: '/service-role/'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AssessmentAccountID}:root'
            Action:
              - 'sts:AssumeRole'
            Condition:
              ArnEquals:
                aws:PrincipalArn: !Sub 'arn:${AWS::Partition}:iam::${AssessmentAccountID}:role/service-role/ObservabilityAssessmentCodeBuildRole'
      Policies:
        - PolicyName: ObservabilityAssessmentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                  - logs:DescribeQueries
                  - logs:DescribeQueryDefinitions
                  - logs:DescribeMetricFilters
                  - logs:DescribeSubscriptionFilters
                  - logs:DescribeExportTasks
                  - logs:DescribeIndexPolicies
                  - logs:DescribeDestinations
                  - logs:DescribeFieldIndexes
                  - logs:GetLogGroupFields
                  - logs:ListLogAnomalyDetectors
                  - logs:ListLogGroupFieldIndexes
                  - logs:StartQuery
                  - cloudwatch:ListMetrics
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:DescribeAnomalyDetectors
                  - cloudwatch:ListDashboards
                  - cloudwatch:GetDashboard
                  - cloudwatch:ListMetricStreams
                  - ec2:DescribeInstances
                  - ec2:DescribeFlowLogs
                  - lambda:ListFunctions
                  - lambda:GetFunctionConfiguration
                  - xray:GetServiceGraph
                  - xray:GetSamplingRules
                  - xray:GetGroups
                  - xray:GetInsightSummaries
                  - xray:GetTraceSummaries
                  - sns:ListTopics
                  - sns:ListSubscriptions
                  - ecs:ListClusters
                  - ecs:DescribeClusters
                  - ecs:ListTasks
                  - ecs:DescribeTasks
                  - ecs:DescribeTaskDefinition
                  - ecs:ListTaskDefinitions
                  - eks:ListClusters
                  - eks:DescribeCluster
                  - eks:ListAddons
                  - eks:DescribeAddon
                  - synthetics:DescribeCanaries
                  - rum:ListAppMonitors
                  - ssm:DescribeInstanceInformation
                  - ssm:GetCommandInvocation
                  - application-signals:ListServices
                  - application-signals:ListServiceLevelObjectives
                  - organizations:DescribeOrganization
                  - organizations:DescribeAccount
                  - tag:GetResources
                  - oam:ListLinks
                  - oam:ListSinks
                  - observabilityadmin:ListCentralizationRulesForOrganization
                  - firehose:ListDeliveryStreams
                  - firehose:DescribeDeliveryStream
                  - kinesis:ListStreams
                  - aidevops:ListAgentSpaces
                Resource: '*'
              # Sole write action in this policy. The EC2 CloudWatch-agent check
              # runs the AWS-owned AWS-RunShellScript document on instances, which
              # requires ssm:SendCommand. Scope it to that one document and this
              # account's instances so the write access is constrained (CKV_AWS_111).
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ssm:*::document/AWS-RunShellScript'
                  - !Sub 'arn:${AWS::Partition}:ec2:*:${AWS::AccountId}:instance/*'

Outputs:
  RoleArn:
    Description: ARN of the Observability Assessment role
    Value: !GetAtt ObservabilityAssessmentRole.Arn
